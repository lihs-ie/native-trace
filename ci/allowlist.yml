# ci/allowlist.yml — 本番パスの test double / 例外を期限付きで許可する (native-trace)。
# verify-no-prod-doubles.sh が path/expires_at を読み、期限内のものだけ検出から除外する。
# verify-allowlist-expiry.sh が無期限・期限切れを CI で fail させる。
#
# entries:
#   - rule: no-prod-doubles
#     path: "applications/backend/src/**/Generated/**"
#     owner: "@lihs-ie"
#     reason: "protoc 生成コードに stub 命名が含まれるため"
#     expires_at: "2026-09-30"
entries:
  - rule: no-prod-doubles
    path: "applications/frontend/src/app/page.test.tsx"
    owner: "@lihs-ie"
    reason: "page.tsx の client fetch をテストするためのモック。テストファイル専用で本番パスへの混入なし。"
    expires_at: "2027-06-30"
  - rule: no-prod-doubles
    path: "applications/frontend/src/app/api/v1/tts/route.test.ts"
    owner: "@lihs-ie"
    reason: "TTS プロキシ route の unit/contract test。vi.mock で config モジュールをモックし fetch を vi.stubGlobal で差し替える。テストファイル専用で本番パスへの混入なし (M-124)。"
    expires_at: "2027-06-30"
  - rule: no-prod-doubles
    path: "applications/frontend/src/app/materials/*/sections/*/page.render.test.tsx"
    owner: "@lihs-ie"
    reason: "WorkspacePage の low_quality / failed 状態 render 統合テスト。vi.mock(@/lib/api-client) をテストファイル内に閉じ、EngineSegSelector の dock 描画到達を assert する。本番コードへの混入なし (Must-1 / Must-2)。"
    expires_at: "2027-06-30"
