<!-- source: self-authored schematic for NativeTrace | license: CC0 | phoneme: /θ/ -->
<!-- Voiceless dental fricative: tongue tip at/between upper front teeth, friction, no voice -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Head outline (right-facing sagittal section) -->
  <path d="M 80 30 Q 200 20 230 60 Q 260 100 250 160 Q 240 220 200 260 Q 160 295 120 300 Q 90 302 75 280 L 70 200 L 65 120 Z" stroke-width="2.5"/>

  <!-- Hard palate -->
  <path d="M 155 72 Q 185 78 205 95 Q 220 112 222 135" stroke-width="2.5"/>

  <!-- Soft palate (velum) — raised -->
  <path d="M 222 135 Q 228 150 224 165 Q 220 178 215 185" stroke-width="2.5"/>

  <!-- Uvula -->
  <path d="M 215 185 Q 218 195 214 202" stroke-width="2"/>

  <!-- Pharynx back wall -->
  <path d="M 214 202 Q 225 230 230 260" stroke-width="2"/>

  <!-- Lower jaw / chin outline -->
  <path d="M 75 280 Q 120 310 175 305 Q 205 300 230 260" stroke-width="2.5"/>

  <!-- Upper teeth -->
  <line x1="147" y1="138" x2="147" y2="150" stroke-width="2.5"/>
  <line x1="155" y1="136" x2="155" y2="148" stroke-width="2.5"/>
  <line x1="163" y1="137" x2="163" y2="149" stroke-width="2.5"/>

  <!-- Lower teeth -->
  <line x1="147" y1="167" x2="147" y2="179" stroke-width="2.5"/>
  <line x1="155" y1="167" x2="155" y2="179" stroke-width="2.5"/>
  <line x1="163" y1="167" x2="163" y2="179" stroke-width="2.5"/>

  <!-- Lips — open enough for interdental gesture -->
  <path d="M 128 145 Q 138 140 150 141 Q 158 142 165 141" stroke-width="2"/>
  <path d="M 128 166 Q 138 172 150 170 Q 158 169 165 167" stroke-width="2"/>

  <!-- TONGUE: tip between teeth (interdental) — extends slightly past teeth -->
  <path d="M 175 263 Q 185 245 194 222 Q 200 202 202 185 Q 203 170 200 158 Q 197 148 190 142 Q 183 138 173 136 Q 163 135 155 136" stroke="currentColor" stroke-width="3"/>
  <!-- Tongue tip visible between teeth -->
  <path d="M 155 136 Q 147 136 140 140" stroke="currentColor" stroke-width="3"/>
  <!-- Tongue tip contact indicator -->
  <circle cx="147" cy="140" r="4" fill="currentColor" opacity="0.6"/>

  <!-- Interdental label -->
  <text x="85" y="128" font-size="11" fill="currentColor" stroke="none" font-family="sans-serif">歯の間に挟む</text>
  <line x1="148" y1="130" x2="147" y2="138" stroke-width="1.5"/>

  <!-- Friction airflow (no voice) -->
  <path d="M 138 145 Q 132 152 128 158 Q 124 165 126 172" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M 135 148 Q 129 155 125 161" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="82" y="175" font-size="10" fill="currentColor" stroke="none" font-family="sans-serif">無声摩擦</text>

  <!-- Nasal cavity -->
  <path d="M 155 72 Q 148 50 145 35" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="100" y="42" font-size="10" fill="currentColor" stroke="none" font-family="sans-serif">鼻腔</text>
</svg>
