<!-- source: self-authored schematic for NativeTrace | license: CC0 | phoneme: /æ/ -->
<!-- Near-open front vowel: tongue low-front, jaw wide open, lips unrounded -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Head outline (right-facing sagittal section) -->
  <path d="M 80 30 Q 200 20 230 60 Q 260 100 250 160 Q 240 220 200 260 Q 160 295 120 300 Q 90 302 75 280 L 70 200 L 65 120 Z" stroke-width="2.5"/>

  <!-- Hard palate -->
  <path d="M 155 72 Q 185 78 205 95 Q 220 112 222 135" stroke-width="2.5"/>

  <!-- Soft palate (velum) — raised -->
  <path d="M 222 135 Q 228 150 224 165 Q 220 178 215 185" stroke-width="2.5"/>

  <!-- Uvula -->
  <path d="M 215 185 Q 218 195 214 202" stroke-width="2"/>

  <!-- Pharynx back wall -->
  <path d="M 214 202 Q 225 230 230 260" stroke-width="2"/>

  <!-- Lower jaw / chin outline — wide open for /æ/ -->
  <path d="M 75 280 Q 120 315 178 308 Q 208 302 230 260" stroke-width="2.5"/>

  <!-- Upper teeth -->
  <line x1="147" y1="140" x2="147" y2="152" stroke-width="2.5"/>
  <line x1="155" y1="138" x2="155" y2="150" stroke-width="2.5"/>
  <line x1="163" y1="139" x2="163" y2="151" stroke-width="2.5"/>

  <!-- Lower teeth — dropped down (wide jaw opening) -->
  <line x1="147" y1="182" x2="147" y2="194" stroke-width="2.5"/>
  <line x1="155" y1="182" x2="155" y2="194" stroke-width="2.5"/>
  <line x1="163" y1="182" x2="163" y2="194" stroke-width="2.5"/>

  <!-- Lips — wide open, unrounded -->
  <path d="M 125 148 Q 138 142 152 143 Q 160 143 168 142" stroke-width="2"/>
  <path d="M 125 185 Q 138 192 152 190 Q 160 189 168 186" stroke-width="2"/>

  <!-- TONGUE: low-front position — front part low, tip forward -->
  <path d="M 178 270 Q 188 250 196 230 Q 202 212 204 198 Q 205 185 202 175 Q 198 165 192 160 Q 186 155 178 152 Q 168 150 158 150 Q 150 150 143 154" stroke="currentColor" stroke-width="3"/>
  <!-- Tongue tip forward and low -->
  <path d="M 143 154 Q 136 158 131 165 Q 128 172 130 178" stroke="currentColor" stroke-width="2.5"/>

  <!-- Low-front position indicator -->
  <text x="82" y="200" font-size="10" fill="currentColor" stroke="none" font-family="sans-serif">舌前部・低位</text>
  <line x1="138" y1="197" x2="168" y2="182" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Wide open jaw label -->
  <text x="88" y="250" font-size="11" fill="currentColor" stroke="none" font-family="sans-serif">口を大きく開ける</text>

  <!-- Nasal cavity -->
  <path d="M 155 72 Q 148 50 145 35" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="100" y="42" font-size="10" fill="currentColor" stroke="none" font-family="sans-serif">鼻腔</text>
</svg>
