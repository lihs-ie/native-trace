<!-- source: self-authored schematic for NativeTrace | license: CC0 | phoneme: /ə/ -->
<!-- Mid-central vowel (schwa): tongue in neutral mid-central position, relaxed open mouth -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Head outline (right-facing sagittal section) -->
  <path d="M 80 30 Q 200 20 230 60 Q 260 100 250 160 Q 240 220 200 260 Q 160 295 120 300 Q 90 302 75 280 L 70 200 L 65 120 Z" stroke-width="2.5"/>

  <!-- Hard palate -->
  <path d="M 155 72 Q 185 78 205 95 Q 220 112 222 135" stroke-width="2.5"/>

  <!-- Soft palate (velum) — raised -->
  <path d="M 222 135 Q 228 150 224 165 Q 220 178 215 185" stroke-width="2.5"/>

  <!-- Uvula -->
  <path d="M 215 185 Q 218 195 214 202" stroke-width="2"/>

  <!-- Pharynx back wall -->
  <path d="M 214 202 Q 225 230 230 260" stroke-width="2"/>

  <!-- Lower jaw / chin outline — slightly open -->
  <path d="M 75 280 Q 120 310 175 305 Q 205 300 230 260" stroke-width="2.5"/>

  <!-- Upper teeth -->
  <line x1="147" y1="140" x2="147" y2="152" stroke-width="2.5"/>
  <line x1="155" y1="138" x2="155" y2="150" stroke-width="2.5"/>
  <line x1="163" y1="139" x2="163" y2="151" stroke-width="2.5"/>

  <!-- Lower teeth -->
  <line x1="147" y1="170" x2="147" y2="182" stroke-width="2.5"/>
  <line x1="155" y1="170" x2="155" y2="182" stroke-width="2.5"/>
  <line x1="163" y1="170" x2="163" y2="182" stroke-width="2.5"/>

  <!-- Lips — relaxed, neutral (slight opening) -->
  <path d="M 128 148 Q 138 144 150 145 Q 158 145 166 144" stroke-width="2"/>
  <path d="M 128 166 Q 138 172 150 171 Q 158 170 166 167" stroke-width="2"/>

  <!-- TONGUE: neutral mid-central position — NOT raised/lowered/front/back -->
  <!-- Tongue body flat in middle position -->
  <path d="M 175 263 Q 185 245 194 225 Q 200 208 202 192 Q 204 178 202 167 Q 200 158 195 152 Q 190 147 183 144" stroke="currentColor" stroke-width="3"/>
  <!-- Tongue tip — pointing forward but not raised -->
  <path d="M 183 144 Q 175 142 168 144 Q 163 146 160 150" stroke="currentColor" stroke-width="2.5"/>

  <!-- Neutral position indicator -->
  <text x="85" y="195" font-size="10" fill="currentColor" stroke="none" font-family="sans-serif">中央・中段</text>
  <line x1="130" y1="192" x2="188" y2="175" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Relaxed label -->
  <text x="90" y="135" font-size="11" fill="currentColor" stroke="none" font-family="sans-serif">脱力・中性位</text>

  <!-- Airflow central -->
  <path d="M 153 158 Q 146 163 140 168 Q 134 173 133 180" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Nasal cavity -->
  <path d="M 155 72 Q 148 50 145 35" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="100" y="42" font-size="10" fill="currentColor" stroke="none" font-family="sans-serif">鼻腔</text>
</svg>
