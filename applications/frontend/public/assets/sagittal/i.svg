<!-- source: self-authored schematic for NativeTrace | license: CC0 | phoneme: /iː/ -->
<!-- Close front vowel (long): tongue high-front, lips spread, narrow jaw opening -->
<!-- NOTE: self-authored proxy — used for both /iː/ and /ɪ/ (nearest available approximation) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Head outline (right-facing sagittal section) -->
  <path d="M 80 30 Q 200 20 230 60 Q 260 100 250 160 Q 240 220 200 260 Q 160 295 120 300 Q 90 302 75 280 L 70 200 L 65 120 Z" stroke-width="2.5"/>

  <!-- Hard palate -->
  <path d="M 155 72 Q 185 78 205 95 Q 220 112 222 135" stroke-width="2.5"/>

  <!-- Soft palate (velum) — raised -->
  <path d="M 222 135 Q 228 150 224 165 Q 220 178 215 185" stroke-width="2.5"/>

  <!-- Uvula -->
  <path d="M 215 185 Q 218 195 214 202" stroke-width="2"/>

  <!-- Pharynx back wall -->
  <path d="M 214 202 Q 225 230 230 260" stroke-width="2"/>

  <!-- Lower jaw / chin outline — narrow opening -->
  <path d="M 75 280 Q 120 308 174 303 Q 204 298 230 260" stroke-width="2.5"/>

  <!-- Upper teeth -->
  <line x1="147" y1="138" x2="147" y2="150" stroke-width="2.5"/>
  <line x1="155" y1="136" x2="155" y2="148" stroke-width="2.5"/>
  <line x1="163" y1="137" x2="163" y2="149" stroke-width="2.5"/>

  <!-- Lower teeth — narrow opening (close vowel) -->
  <line x1="147" y1="158" x2="147" y2="170" stroke-width="2.5"/>
  <line x1="155" y1="158" x2="155" y2="170" stroke-width="2.5"/>
  <line x1="163" y1="158" x2="163" y2="170" stroke-width="2.5"/>

  <!-- Lips — spread (corners pulled back) -->
  <path d="M 120 143 Q 132 138 148 140 Q 158 141 168 139" stroke-width="2.5"/>
  <path d="M 120 162 Q 132 167 148 166 Q 158 165 168 163" stroke-width="2.5"/>

  <!-- TONGUE: high-front position — front part raised toward palate -->
  <path d="M 178 265 Q 188 245 196 225 Q 202 208 204 193 Q 205 180 202 170 Q 198 160 192 153 Q 184 146 174 142 Q 164 139 155 138" stroke="currentColor" stroke-width="3"/>
  <!-- Tongue tip — close to upper teeth, high position -->
  <path d="M 155 138 Q 148 137 141 139 Q 136 143 134 149" stroke="currentColor" stroke-width="2.5"/>

  <!-- High-front indicator with narrow gap to palate -->
  <line x1="182" y1="148" x2="200" y2="108" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="82" y="112" font-size="10" fill="currentColor" stroke="none" font-family="sans-serif">舌前部・高位（口蓋に近い）</text>

  <!-- Spread lips indicator -->
  <text x="82" y="245" font-size="11" fill="currentColor" stroke="none" font-family="sans-serif">口角を横に引く</text>

  <!-- Proxy note -->
  <text x="82" y="300" font-size="9" fill="currentColor" stroke="none" font-family="sans-serif">/iː/・/ɪ/ 近似図</text>

  <!-- Nasal cavity -->
  <path d="M 155 72 Q 148 50 145 35" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="100" y="42" font-size="10" fill="currentColor" stroke="none" font-family="sans-serif">鼻腔</text>
</svg>
