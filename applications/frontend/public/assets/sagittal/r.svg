<!-- English retroflex/bunched approximant: tongue tip retracted, mid-tongue bunched, NO alveolar contact -->
<!-- NOTE: self-authored schematic; English retroflex/bunched approximant (NOT the back-of-throat fricative); phonetic review recommended -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Head outline (right-facing sagittal section) -->
  <path d="M 80 30 Q 200 20 230 60 Q 260 100 250 160 Q 240 220 200 260 Q 160 295 120 300 Q 90 302 75 280 L 70 200 L 65 120 Z" stroke-width="2.5"/>

  <!-- Hard palate -->
  <path d="M 155 72 Q 185 78 205 95 Q 220 112 222 135" stroke-width="2.5"/>

  <!-- Soft palate (velum) — raised -->
  <path d="M 222 135 Q 228 150 224 165 Q 220 178 215 185" stroke-width="2.5"/>

  <!-- Uvula -->
  <path d="M 215 185 Q 218 195 214 202" stroke-width="2"/>

  <!-- Pharynx back wall -->
  <path d="M 214 202 Q 225 230 230 260" stroke-width="2"/>

  <!-- Lower jaw / chin outline -->
  <path d="M 75 280 Q 120 310 175 305 Q 205 300 230 260" stroke-width="2.5"/>

  <!-- Upper teeth -->
  <line x1="147" y1="138" x2="147" y2="150" stroke-width="2.5"/>
  <line x1="155" y1="136" x2="155" y2="148" stroke-width="2.5"/>
  <line x1="163" y1="137" x2="163" y2="149" stroke-width="2.5"/>

  <!-- Lower teeth -->
  <line x1="147" y1="165" x2="147" y2="177" stroke-width="2.5"/>
  <line x1="155" y1="166" x2="155" y2="178" stroke-width="2.5"/>
  <line x1="163" y1="165" x2="163" y2="177" stroke-width="2.5"/>

  <!-- Lips — slightly rounded -->
  <path d="M 128 145 Q 138 140 150 141 Q 158 142 166 141" stroke-width="2"/>
  <path d="M 128 168 Q 138 175 150 174 Q 158 172 166 168" stroke-width="2"/>

  <!-- TONGUE: bunched approximant — tip RETRACTED (not touching), mid-tongue raised toward post-alveolar -->
  <!-- Tongue body — bunched/raised mid -->
  <path d="M 175 262 Q 188 245 200 225 Q 210 205 212 188 Q 213 175 208 162 Q 203 150 195 143" stroke="currentColor" stroke-width="3"/>
  <!-- Tongue tip — curved back (retroflex) / retracted — gap below palate -->
  <path d="M 195 143 Q 188 137 180 135 Q 170 133 160 138" stroke="currentColor" stroke-width="3"/>

  <!-- Gap indicator: NO contact with alveolar ridge -->
  <line x1="162" y1="130" x2="175" y2="128" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="105" y="120" font-size="10" fill="currentColor" stroke="none" font-family="sans-serif">接触なし</text>
  <line x1="148" y1="121" x2="160" y2="128" stroke-width="1.5"/>

  <!-- Bunched/raised indicator arrow -->
  <path d="M 210 168 L 210 155" stroke-width="2"/>
  <path d="M 206 158 L 210 152 L 214 158" stroke-width="1.5"/>
  <text x="215" y="165" font-size="10" fill="currentColor" stroke="none" font-family="sans-serif">舌中央を盛り上げる</text>

  <!-- Airflow (central, unobstructed approximant) -->
  <path d="M 150 155 Q 143 158 137 162 Q 132 167 132 175" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="95" y="180" font-size="10" fill="currentColor" stroke="none" font-family="sans-serif">中央気流</text>

  <!-- Nasal cavity -->
  <path d="M 155 72 Q 148 50 145 35" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="100" y="42" font-size="10" fill="currentColor" stroke="none" font-family="sans-serif">鼻腔</text>
</svg>
