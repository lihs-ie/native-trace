<!-- source: self-authored schematic for NativeTrace | license: CC0 | phoneme: /l/ -->
<!-- Alveolar lateral approximant: tongue tip contacts alveolar ridge, lateral airflow on both sides -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Head outline (right-facing sagittal section) -->
  <path d="M 80 30 Q 200 20 230 60 Q 260 100 250 160 Q 240 220 200 260 Q 160 295 120 300 Q 90 302 75 280 L 70 200 L 65 120 Z" stroke-width="2.5"/>

  <!-- Hard palate -->
  <path d="M 155 72 Q 185 78 205 95 Q 220 112 222 135" stroke-width="2.5"/>

  <!-- Soft palate (velum) — raised (velopharyngeal closure) -->
  <path d="M 222 135 Q 228 150 224 165 Q 220 178 215 185" stroke-width="2.5"/>

  <!-- Uvula -->
  <path d="M 215 185 Q 218 195 214 202" stroke-width="2"/>

  <!-- Pharynx back wall -->
  <path d="M 214 202 Q 225 230 230 260" stroke-width="2"/>

  <!-- Lower jaw / chin outline -->
  <path d="M 75 280 Q 120 310 175 305 Q 205 300 230 260" stroke-width="2.5"/>

  <!-- Upper teeth -->
  <line x1="147" y1="138" x2="147" y2="150" stroke-width="2.5"/>
  <line x1="155" y1="136" x2="155" y2="148" stroke-width="2.5"/>
  <line x1="163" y1="137" x2="163" y2="149" stroke-width="2.5"/>

  <!-- Lower teeth -->
  <line x1="147" y1="165" x2="147" y2="177" stroke-width="2.5"/>
  <line x1="155" y1="166" x2="155" y2="178" stroke-width="2.5"/>
  <line x1="163" y1="165" x2="163" y2="177" stroke-width="2.5"/>

  <!-- Lips -->
  <path d="M 130 143 Q 140 138 150 140 Q 158 142 165 140" stroke-width="2"/>
  <path d="M 130 170 Q 140 178 150 175 Q 158 172 165 170" stroke-width="2"/>

  <!-- TONGUE: tip raised and TOUCHING alveolar ridge — /l/ contact point -->
  <path d="M 175 260 Q 185 240 192 220 Q 198 200 200 180 Q 202 165 200 155 Q 198 145 188 138 L 175 132" stroke="currentColor" stroke-width="3"/>
  <!-- Tongue tip at alveolar ridge (contact) -->
  <circle cx="175" cy="132" r="5" fill="currentColor" opacity="0.7"/>
  <!-- Contact label -->
  <text x="125" y="125" font-size="11" fill="currentColor" stroke="none" font-family="sans-serif">接触</text>
  <line x1="155" y1="126" x2="170" y2="130" stroke-width="1.5"/>

  <!-- Lateral airflow arrows (both sides, shown schematically on one side) -->
  <path d="M 145 155 Q 138 160 132 165 Q 126 170 128 178" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="92" y="178" font-size="10" fill="currentColor" stroke="none" font-family="sans-serif">側面気流</text>

  <!-- Nasal cavity indicator -->
  <path d="M 155 72 Q 148 50 145 35" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="100" y="42" font-size="10" fill="currentColor" stroke="none" font-family="sans-serif">鼻腔</text>
</svg>
