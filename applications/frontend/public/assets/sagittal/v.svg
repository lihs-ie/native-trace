<!-- source: self-authored schematic for NativeTrace | license: CC0 | phoneme: /v/ -->
<!-- Voiced labiodental fricative: lower lip to upper front teeth, voice + friction -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Head outline (right-facing sagittal section) -->
  <path d="M 80 30 Q 200 20 230 60 Q 260 100 250 160 Q 240 220 200 260 Q 160 295 120 300 Q 90 302 75 280 L 70 200 L 65 120 Z" stroke-width="2.5"/>

  <!-- Hard palate -->
  <path d="M 155 72 Q 185 78 205 95 Q 220 112 222 135" stroke-width="2.5"/>

  <!-- Soft palate (velum) — raised -->
  <path d="M 222 135 Q 228 150 224 165 Q 220 178 215 185" stroke-width="2.5"/>

  <!-- Uvula -->
  <path d="M 215 185 Q 218 195 214 202" stroke-width="2"/>

  <!-- Pharynx back wall -->
  <path d="M 214 202 Q 225 230 230 260" stroke-width="2"/>

  <!-- Lower jaw / chin outline -->
  <path d="M 75 280 Q 120 310 175 305 Q 205 300 230 260" stroke-width="2.5"/>

  <!-- Upper teeth -->
  <line x1="147" y1="138" x2="147" y2="150" stroke-width="2.5"/>
  <line x1="155" y1="136" x2="155" y2="148" stroke-width="2.5"/>
  <line x1="163" y1="137" x2="163" y2="149" stroke-width="2.5"/>

  <!-- Lower lip raised to UPPER TEETH — labiodental contact -->
  <path d="M 120 158 Q 133 148 148 146 Q 156 145 165 147" stroke="currentColor" stroke-width="3"/>
  <!-- Contact circle at teeth-lip junction -->
  <circle cx="156" cy="148" r="5" fill="currentColor" opacity="0.6"/>

  <!-- Lower jaw / lower lip body (lowered for labiodental) -->
  <path d="M 120 160 Q 130 162 140 168 Q 148 173 155 175" stroke-width="2"/>

  <!-- TONGUE: mid position (tongue not involved in /v/) -->
  <path d="M 175 265 Q 185 245 192 225 Q 198 205 200 185 Q 200 170 196 158 Q 192 148 185 143" stroke="currentColor" stroke-width="2.5"/>

  <!-- Voicing indicator (vibration wavy line at larynx) -->
  <path d="M 230 245 Q 238 240 244 245 Q 250 250 244 255 Q 238 260 244 265" stroke-width="1.5"/>
  <text x="218" y="238" font-size="10" fill="currentColor" stroke="none" font-family="sans-serif">有声</text>

  <!-- Friction airflow indicator -->
  <path d="M 148 153 Q 140 160 132 165" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M 148 150 Q 140 155 132 157" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="86" y="162" font-size="10" fill="currentColor" stroke="none" font-family="sans-serif">摩擦気流</text>

  <!-- Contact label -->
  <text x="90" y="140" font-size="11" fill="currentColor" stroke="none" font-family="sans-serif">歯・下唇接触</text>
  <line x1="148" y1="141" x2="150" y2="146" stroke-width="1.5"/>

  <!-- Nasal cavity -->
  <path d="M 155 72 Q 148 50 145 35" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="100" y="42" font-size="10" fill="currentColor" stroke="none" font-family="sans-serif">鼻腔</text>
</svg>
