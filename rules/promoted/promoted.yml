# rules/promoted/<id>.yml — harness-maintainer が昇格したルールの記録。
# 正本 (agent-policy.md) / hook / lint / smoke / rubric のどこへ昇格したかを残す。
id: <no_prod_mocks>
failure_class: <spec_violation | dataflow_unwired | ...>
trigger:
  repeated_count: <2>
  sources: ["code_review", "ci"]
rule:
  summary: "Production code must not use mock/stub/fake/dummy/spy helpers"
  enforcement:
    - type: grep_gate           # grep_gate | ast_grep | hlint | smoke | rubric_item | short_rule
      paths_exclude: ["test/**", "tests/**", "__tests__/**", "spec/**", "specs/**"]
      pattern: '\b(mock|stub|fake|dummy|spy)\b'
    - type: rubric_item
      detail: "rubric/core/spec.md の mock 禁止行"
evidence_required:
  - changed_files
  - grep_output
verified_fires: true            # 違反で非ゼロ / clean で 0 を確認済みか
rollback_condition: "false_positive_rate > 0.15"
owner: "@lihs-ie"
---
# A1: Haskell の partial record construction を build error 化する設定の有無を静的検査する。
id: haskell_werror_missing_fields
failure_class: dataflow_unwired   # record にフィールド追加→builder 未設定→runtime thunk crash
trigger:
  repeated_count: 1               # P0 incident。runtime crash (worker HTTP 000) で blocking
  sources: ["ci", "runtime_verify"]
rule:
  summary: "全 *.cabal の warning 設定に -Werror=missing-fields があること (partial record を build error 化)"
  enforcement:
    - type: grep_gate
      detail: "scripts/verify-haskell-warnings.sh が applications/backend/**/*.cabal に -Werror=missing-fields を grep。欠ければ exit 1"
    - type: smoke
      detail: "fitness hook (scripts/agent-policy-hook.sh) が *.cabal 編集時に実行 + CI (.github/workflows/pr-gate.yml の policy job)"
    - type: rubric_item
      detail: "rubric/packs/haskell.md の cabal warnings 判定項目"
evidence_required:
  - changed_files
  - grep_output
verified_fires: true             # cabal から flag 除去→exit 1、復帰→exit 0 を実コマンドで確認
rollback_condition: "false_positive_rate > 0.15"   # cabal は数が少なく FP リスクは極小
owner: "@lihs-ie"
---
# A2: drizzle schema 変更に migration 再生成が追随しているかを co-change 検査する。
id: frontend_schema_needs_migration
failure_class: dataflow_unwired   # schema 変更後 db:generate 忘れ→実機 no such table
trigger:
  repeated_count: 1
  sources: ["runtime", "memory"]  # incident 2026-06-12, memory: drizzle-migration-regenerate-after-schema
rule:
  summary: "infrastructure/drizzle/schema.ts を変更したら drizzle/*.sql (migration) も共変更する"
  enforcement:
    - type: smoke
      detail: "wiring_manifest.yml rule frontend-schema-needs-migration を scripts/verify-wiring.sh が co-change 検査 (hook + CI policy job)"
evidence_required:
  - changed_files
rollback_condition: "false_positive_rate > 0.15"   # 超過時は when を schema.ts 内の table 定義変更に narrow / waiver で対処
waiver: ".agent-evidence/wiring-waivers.txt に rule id を 1 行 (無期限 allowlist は作らない)"
verified_fires: true             # synthetic worktree: schema 単独→exit1、schema+sql→exit0 を確認
owner: "@lihs-ie"
---
# A3: python-analyzer の依存追加が Dockerfile に反映されているかを co-change 検査する。
id: python_analyzer_pyproject_needs_dockerfile
failure_class: dataflow_unwired   # pyproject 依存追加だけ→コンテナ未反映→TTS 500 / f0 empty
trigger:
  repeated_count: 1
  sources: ["runtime", "memory"]  # incident 2026-06-12, memory: python-analyzer-dockerfile-hardcoded-pip
rule:
  summary: "pyproject.toml を変更したら Dockerfile (ハードコード pip list) も共変更する"
  enforcement:
    - type: smoke
      detail: "wiring_manifest.yml rule python-analyzer-pyproject-needs-dockerfile を scripts/verify-wiring.sh が co-change 検査 (hook + CI policy job)"
evidence_required:
  - changed_files
rollback_condition: "false_positive_rate > 0.15"   # version bump 等で Dockerfile 不要なら waiver
waiver: ".agent-evidence/wiring-waivers.txt に rule id を 1 行 (無期限 allowlist は作らない)"
verified_fires: true             # synthetic worktree: pyproject 単独→rule fail、+Dockerfile→rule OK を確認
owner: "@lihs-ie"
---
# B: E2E seed 直焼きを live-derivation の証拠と誤認しない rubric 強化 (doc-only)。
id: e2e_seed_not_live_derivation_evidence
failure_class: spec_violation     # derived フィールドの Must を seed-render pass で代替
trigger:
  repeated_count: 1
  sources: ["spec_grade"]          # incident 2026-06-13 M-104R-c
rule:
  summary: "E2E seed が derived 値を直接 DB に差し込む場合、live-derivation の証拠にしない。real entrypoint→usecase→DB の integration assert を別途要求する"
  enforcement:
    - type: rubric_item
      detail: "rubric/core/wiring.md の『明示的に fail とする配線ミス例』に seed 直焼き項目を追加"
evidence_required:
  - changed_files
rollback_condition: "n/a (doc-only rubric。executable gate ではないため FP exit-code は無い)"
verified_fires: false            # executable gate でないため exit-code firing は無し (rubric 追記のみ)
owner: "@lihs-ie"
---
# FC-1: 新規 .hs の postpositive `import X qualified` で fourmolu per-edit hook が parse 失敗する
# 根本を、grep gate ではなく fourmolu 起動オプションの単一点修正で解決する (FP ゼロ)。
id: fourmolu_new_file_import_qualified_post
failure_class: harness_false_block   # 正しいコードを per-edit hook が誤ってブロックする (toolchain 不整合)
trigger:
  repeated_count: 3                  # ShadowingLagSpec / GoldenSpeakerSpec / GoldenSpeakerClient で回避 pragma を後付け
  sources: ["fitness_hook"]
rule:
  summary: "fitness hook の fourmolu 呼び出しに --ghc-opt -XImportQualifiedPost を渡し、cabal 未登録の新規 .hs でも postpositive qualified を GHC2024 整合で parse できるようにする"
  root_cause: "fourmolu は .cabal の exposed-modules/other-modules に登録済みの module からのみ default-language(GHC2024)/default-extensions を抽出する。新規 .hs は未登録のため GHC2024 由来の ImportQualifiedPost が効かず parse error になる。既存 .hs が pragma 無しで通るのは cabal 登録済みだから (= grep gate は大量 FP を生む。採用せず)。"
  enforcement:
    - type: short_rule
      detail: "scripts/fitness/hook.sh の run_backend_checks 内 fourmolu 呼び出しに --ghc-opt -XImportQualifiedPost を追加 (単一点修正)"
    - type: rubric_item
      detail: "rubric/packs/haskell.md の補足節に『新規 .hs の postpositive qualified は hook の --ghc-opt で解決済み・pragma 都度付与不要』を記録"
evidence_required:
  - changed_files
  - grep_output                      # 全 .hs で plain と --ghc-opt の exit-code diff = 0
rollback_condition: "false_positive_rate > 0.15"   # フラグ追加で既存挙動が変わる (整形差が出る) なら rollback。全14 .hs で exit-code diff 0 を確認済みなので FP リスク極小
not_chosen:
  - "全 postpositive-qualified .hs に pragma 必須化する grep gate (既存 worker .hs の大半が pragma 無しで build 成立しており大量 FP。failure-miner の明示警告通り不採用)"
verified_fires: true               # 新規未登録 .hs: plain で exit 102 (postpositive parse fail) → --ghc-opt -XImportQualifiedPost で exit 0 を実コマンドで確認。既存14 .hs は両条件で exit-code diff 0 (FP ゼロ)
owner: "@lihs-ie"
---
# FC-2: Api.hs の WorkerApi 型に route を追加しても Application.hs server に handler を結線せず早期終了する。
# wiring_manifest の co-change rule を補完し、route 数 ↔ handler 数の parity を静的に機械検査する。
id: servant_route_handler_parity
failure_class: dataflow_unwired      # route 型だけ追加・handler 未結線で done 報告 (build 待たず検出したい)
trigger:
  repeated_count: 3
  sources: ["code_review", "implementer_early_exit"]
rule:
  summary: "Api.hs の WorkerApi route 数 (HTTP method combinator) と Application.hs server の handler 数 (:<|> 項+1) が一致すること。不一致で exit 1"
  enforcement:
    - type: grep_gate
      detail: "scripts/verify-servant-route-handler-parity.sh が Api.hs の type WorkerApi ブロック内 method 数と Application.hs server の :<|> 項数+1 を比較。tree 全体を常時検査 (恒常的不変条件)"
    - type: smoke
      detail: "scripts/agent-policy-hook.sh が Api.hs/Application.hs 編集時に実行 + CI (.github/workflows/pr-gate.yml policy job の Servant route/handler parity step)"
    - type: rubric_item
      detail: "rubric/packs/haskell.md に Servant route↔handler parity 判定項目を追加。rubric/core/wiring.md に『implementer 終了メッセージを配線証拠にしない』節"
evidence_required:
  - changed_files
  - grep_output
rollback_condition: "false_positive_rate > 0.15"   # 超過時は method/handler カウントの正規表現を narrow に (継続行・コメント混入の誤カウントが出たら除外)
verified_fires: true               # clean: routes=5/handlers=5 → exit 0。synthetic violation (Api.hs に route +1, handler 無し): routes=6/handlers=5 → exit 1。restore → exit 0 を実コマンドで確認
owner: "@lihs-ie"
---
# FC-3: 重い Haskell per-edit hook で implementer が budget 切れ早期終了し、配線途中で離脱する。
# memory 既出だが rule/rubric 未昇格。3 回再発で §6 (同 class 3 回) を超過 → 正本 + rubric に昇格。
id: heavy_haskell_per_edit_hook_budget_exhaustion
failure_class: process_early_exit    # per-edit hook 重量で配線未完了のまま離脱・偽完了報告
trigger:
  repeated_count: 3
  sources: ["memory", "implementer_early_exit"]   # memory: haskell-per-edit-hook-burns-subagent-budget
rule:
  summary: "大 Haskell 配線は API 型 + handler + Types + cabal を一括編集してから build。implementer 早期終了時、orchestrator は終了メッセージを信用せず grep/build で landed を確認し残件だけ再投する"
  enforcement:
    - type: short_rule
      detail: "正本 ~/.claude/docs/agent-policy.md §3 (Done when) に大配線一括編集 + 早期終了時 grep/build 確認の注記を追加。kit テンプレ AGENTS.md.tmpl の Wiring points 節にも同趣旨を追加 (kit 再適用で生成 AGENTS.md/CLAUDE.md に伝播)"
    - type: rubric_item
      detail: "rubric/core/wiring.md に『implementer 終了メッセージを配線証拠にしない (grep/build で landed 確認)』節を追加"
evidence_required:
  - changed_files
propagation: "正本 + kit テンプレを更新済。生成物 AGENTS.md/CLAUDE.md は直接編集せず、次回 agent-policy-kit 再適用 (Detect→Diff→Apply) で伝播する"
rollback_condition: "n/a (doc-only short_rule + rubric。executable gate ではないため FP exit-code は無い)"
verified_fires: false              # doc-only 昇格 (exit-code firing は無し)
owner: "@lihs-ie"
---
# FC-4: 空 __tests__ を作成して done 報告 + Playwright 未実行。done-evaluator が 1 回捕捉。
id: empty_tests_dir_e2e_skipped_not_done
failure_class: spec_violation        # テスト存在/空テスト緑/E2E 未実行を done 証拠に使う
trigger:
  repeated_count: 1
  sources: ["done_evaluate"]
rule:
  summary: "空 __tests__ / テスト 0 件は done でない (1 件以上 pass 必須)。受入条件に E2E を含む Must は .agent-evidence に Playwright 実行ログを必須証拠とする"
  enforcement:
    - type: rubric_item
      detail: "rubric/packs/nextjs.md に『空 __tests__ は done でない・1 件以上 pass 必須』『spec 受入に Playwright がある screen feature は E2E 実行を done 必須証拠に』の 2 項目。rubric/core/spec.md に『受入条件に E2E を含む Must は .agent-evidence に E2E 実行ログ必須』1 行"
evidence_required:
  - changed_files
rollback_condition: "n/a (doc-only rubric。executable gate ではないため FP exit-code は無い)"
verified_fires: false              # doc-only 昇格 (exit-code firing は無し)
owner: "@lihs-ie"
