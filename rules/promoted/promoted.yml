# CAND-A: default (no-arg) mode の verify-*.sh が committed diff (base...HEAD) のみで changed を作るため、
# 未コミット/untracked のみの作業ツリーで committed diff が空だと走査対象ゼロで空振り exit 0 (vacuous pass)。
# committed diff が空のときだけ working-tree 変更にフォールバックする (CI は常に非空なので CI-inert)。
id: verify_gate_working_tree_blindspot
failure_class: harness_false_negative   # process: 決定論ゲートが未コミット作業を検査せず空振り green を返す (gate-blindspot)
trigger:
  repeated_count: 2                  # memory verify-scripts-skip-untracked (2026-06-11) + this-session (2026-06-17/18)
  sources: ["memory", "this_session"]
rule:
  summary: "verify-{no-prod-doubles,test-bypass,no-stub-placeholder,wiring}.sh の default モードで committed diff (base...HEAD) が空なら working-tree (git diff HEAD + git ls-files --others) にフォールバックして未コミット/untracked も検査する"
  root_cause: "default モードは changed を base...HEAD (committed diff、base=origin/main) で作る。未コミット/untracked のみの作業ツリーで base に対する committed diff が空だと走査対象ゼロになり vacuously exit 0。per-file ($1) モード (fitness hook) と CI (commit 済みブランチで base...HEAD 非空) は影響なし。default モードの未コミット作業だけが盲点。"
  enforcement:
    - type: short_rule
      detail: "4 スクリプト ×3 location (native-trace scripts/, dotfiles scripts/, kit templates executable_*) の default else 分岐に『committed diff 空なら working-tree フォールバック』を追加。changed 算出後・早期 exit 前 (verify-wiring は line 25 の early exit 前) に挿入。per-file 分岐は不変"
    - type: short_rule
      detail: "正本 ~/.claude/docs/agent-policy.md §3 (Done when) の『working-tree 状態で回す決定論ゲートは未コミット変更も検査対象に含める』を workspace/dotfiles 側 source にも反映 (live ~/.claude には既存)"
evidence_required:
  - changed_files
  - grep_output                      # 全 12 copy で fallback ブロックが byte-identical (md5 一致) を確認済
rollback_condition: "false_positive_rate > 0.15"   # 超過時は working-tree フォールバックに generated/ 等の除外を追加 (現状 test_dir_re/generated/ の既存除外と code_ext_re で絞り済み)
verified_fires: true               # BASE_REF=HEAD で committed diff を空に → 修正前 (committed HEAD 版) exit 0 (vacuous pass=bug 再現)、修正後 violation で exit 1、clean で exit 0、per-file ($1) exit 0、CI-mode (origin/main base, 785 file 非空) exit 0 で fallback inert。no-prod-doubles でも cross-check (violation exit 1 / clean exit 0)。証跡 .agent-evidence/self-improve-fire-check-2026-06-18.txt
owner: "@lihs-ie"
---
# CAND-B: spec-curator が worker の inbound entrypoint (POST :8787/v1/pronunciation-assessments) と
# worker が呼ぶ下流 route (/v1/analyze on analyzer :8788, /v1/convert on golden) を取り違える。
# prose grep gate は FP 過多 (spec は下流 route を正当に列挙する) で不可 → doc-only (rubric + 正本)。
id: spec_curator_worker_route_confusion
failure_class: spec_violation        # real_entrypoint に下流 route を記録し inbound と取り違える
trigger:
  repeated_count: 2                  # incident 2026-06-14 (done-evaluator が wiring-map entrypoint 取り違え) + this-session の spec draft
  sources: ["incident", "spec_draft"]
rule:
  summary: "spec-curator は real_entrypoint に対象サービスの inbound route を記録し、そのサービスが呼ぶ下流 route を inbound entrypoint と取り違えない。worker は inbound = POST /v1/pronunciation-assessments (8787)、/v1/analyze (8788) / /v1/convert は下流"
  enforcement:
    - type: rubric_item
      detail: "rubric/core/wiring.md の real_entrypoint 節に spec-curator 向けチェック行を追加 (worker inbound = POST /v1/pronunciation-assessments、下流 route を inbound に記録しない)"
    - type: rubric_item
      detail: "rubric/core/spec.md の判定原則に Must 正規化行を追加 (worker feature の spec は real entrypoint を POST /v1/pronunciation-assessments と明記)"
    - type: short_rule
      detail: "正本 ~/.claude/docs/agent-policy.md §2 に spec-curator 向け 1 行 (generic): real_entrypoint に対象サービスの inbound route を記録し下流呼び出し route を inbound と取り違えない。kit templates rubric/core/{wiring,spec}.md にも generic 版を追加 (kit 再適用で各 repo に伝播)"
not_chosen:
  - "spec 散文への grep gate (spec は下流 route を正当に列挙するため FP 過多。failure-miner の明示警告通り不採用)"
eval_deferred:
  reason: "§6 しきい値 (同 failure class 3 回) で eval 作成。現在 2 回 (incident 2026-06-14 + this-session spec draft) のため eval は 3 回目の再発まで保留 (evals/ ファイルは作成しない)"
evidence_required:
  - changed_files
rollback_condition: "n/a (doc-only rubric + 正本。executable gate ではないため FP exit-code は無い)"
verified_fires: false              # doc-only 昇格 (exit-code firing は無し)
owner: "@lihs-ie"
---
# CAND-b1: python-analyzer / golden-speaker の Dockerfile は pyproject ではなくハードコード pip list で
# 依存を焼き込む。src が import する third-party が pyproject にあっても Dockerfile の pip 行に無いと
# image に入らず、起動時 import の ModuleNotFoundError が broad except に握り潰され silent runtime dead-wiring。
# 既存 wiring rule python-analyzer-pyproject-needs-dockerfile は *ファイル共変更* しか見ず Dockerfile CONTENT を
# 検査しない (= co-change しても pip 行への追記漏れを通す) ギャップを、import→distribution 解決の content gate で塞ぐ。
id: analyzer_dockerfile_dep_content_gap
failure_class: dataflow_unwired      # dep が image に入らず import 失敗が握り潰され機能が runtime で死ぬ
trigger:
  repeated_count: 2                  # kokoro 2026-06-12 (memory python-analyzer-dockerfile-hardcoded-pip) + scipy 2026-06-19 (incident ADR-018)
  sources: ["incident", "runtime_verify", "memory"]
rule:
  summary: "applications/{python-analyzer,golden-speaker}/src/**/*.py が import する third-party module の distribution が、同サービス Dockerfile のハードコード pip install 行 (∪ base-image-pip-allowlist) に含まれること。欠ければ exit 1"
  enforcement:
    - type: grep_gate
      detail: "scripts/verify-analyzer-deps.sh が src の top-level import を収集 → stdlib (host python sys.stdlib_module_names、無ければ維持リスト) と first-party (python_analyzer/golden_speaker/相対) を除外 → scripts/module-to-dist.txt で module→distribution 解決 (renaming 含む) → Dockerfile の pip install ブロックを解析した installed 集合と突合。tree 全体を常時検査 (恒常的不変条件)"
    - type: smoke
      detail: "scripts/agent-policy-hook.sh が applications/{python-analyzer,golden-speaker}/src/**/*.py 編集時に実行 + CI (.github/workflows/pr-gate.yml policy job の Analyzer/golden-speaker src imports present in Dockerfile pip list step、tree 全体)"
  no_silent_skip: "stdlib でも first-party でも module-to-dist.txt にも無い module は FAIL (silent-skip すると盲点を再生産する=rollback trap)。新 third-party を import したら module-to-dist.txt に 1 行追加が必須"
evidence_required:
  - changed_files
  - grep_output
allowlist: "scripts/base-image-pip-allowlist.txt は base image / stdlib 隣接 / 明示 pin 済 transitive のみ (各行に理由コメント必須、無期限 allowlist 禁止)。現状 golden-speaker の numpy / praat-parselmouth (rvc-python==0.1.5 の pinned transitive) のみ"
rollback_condition: "false_positive_rate > 0.15"   # 超過時は module-to-dist.txt の mapping を拡充するか、誤検出 distribution を理由付きで base-image-pip-allowlist.txt に narrow 追加 (silent-skip には絶対戻さない)
verified_fires: true               # clean: 両サービス OK で exit 0。synthetic violation (python-analyzer Dockerfile から scipy pip 行を一時削除): exit 1 で scipy のみを正確に指摘 (他 dep に FP なし)。restore → exit 0。未登録 third-party import probe → exit 1 (silent-skip しない=rollback trap 防御) を実コマンドで確認
owner: "@lihs-ie"
---
# CAND-b2: worker の let/where 束縛を計算したが construction site が literal Nothing/default のまま →
# 束縛が unused で機能が dead だが、-Wunused-local-binds / -Wunused-matches は -Wall に含まれるが
# warning 止まりで cabal build/test が緑を通過する。-Werror=missing-fields の前例に倣い build error 化する。
id: haskell_unused_local_binding_dead_wiring
failure_class: dataflow_unwired      # 計算済み束縛を construction site で消費せず literal default のまま=機能が build 緑で死ぬ
trigger:
  repeated_count: 1                  # ADR-018 GOP-site dead-Nothing (incident 2026-06-19、event 1: acousticEvidence を let で計算したが GOP 構築が = Nothing)。precedent: -Werror=missing-fields は P0 で 1 回昇格済の同型クラス
  sources: ["incident", "static_verify"]
rule:
  summary: "applications/backend/native-trace-worker.cabal の ghc-options に -Werror=unused-local-binds と -Werror=unused-matches があること (計算したが construction site で使われない let/where 束縛を build error 化)"
  enforcement:
    - type: grep_gate
      detail: "scripts/verify-haskell-warnings.sh が worker cabal に両 flag を grep。欠ければ exit 1。-Werror=missing-fields (全 cabal) と同 script に統合"
    - type: smoke
      detail: "scripts/agent-policy-hook.sh が *.cabal 編集時に verify-haskell-warnings.sh を実行 + CI (.github/workflows/pr-gate.yml policy job の Haskell cabal warnings hardened step)。fitness hook の cabal test (-Werror) でも編集ごとに発火"
  precondition_sweep: "flag 追加前に cabal build all で既存 unused-local-binds/unused-matches warning を sweep → ゼロを確認 (clean tree。test-suite 含め scope 縮小不要だったため common warnings に追加)"
evidence_required:
  - changed_files
  - grep_output
rollback_condition: "false_positive_rate > 0.15"   # 超過時 (legit unused が test-suite 等に出る場合) は library stanza のみに scope を縮小。現状 common warnings (全 stanza 共有) で build all 緑なので FP リスク極小
verified_fires: true               # flag 追加後 cabal build all 緑 (exit 0、unused warning ゼロ)。synthetic violation (tokenize where に unused let unusedProbe=(42::Int) を挿入): fitness hook の cabal test が GHC-40910 [-Wunused-local-binds, Werror=unused-local-binds] Defined but not used で build error → 編集ブロック。除去 → 緑。verify-haskell-warnings.sh: flag 有り exit 0、flag 一時削除 exit 1、restore exit 0 を実コマンドで確認
residual: "resolved 2026-06-19 (f32e2ec): Scoring.hs L1136 schwaPhonemes (-Wunused-top-binds) + L83 WordPair (-Wunused-imports) を除去、加えて dead な foldl'/group/FunctionalLoad/flWeight import と dead な resultMale/let measured ブロックを除去。GoldenSpeakerSpec + ShadowingLagSpec を test-suite の other-modules に登録 (-Wmissing-home-modules 解消)。worker は warning-clean で build (73 examples, 0 failures, warning 無しを確認)"
owner: "@lihs-ie"
---
# CAND-b3: proven-done 実行中に orchestrator が implementer に dispatch せず本番コードを直接編集 (keyboard-grab) し、
# その un-delegated edit が束縛を orphan 化する (let/where で計算したが construction site が literal default のまま)
# = dead-wiring。symptom の静的検出は CAND-b2 (-Werror=unused-local-binds) が Haskell で PRIMARY。behavioral 正本は
# §3 + memory agent-dev-follow-pipeline-faithfully で 2× tier 済。本エントリは Haskell 以外の construction site
# (例: run-assessment-job/index.ts の TS literal placeholder) 向けの doc-only rubric secondary net のみを追加する。
id: orchestrator_hand_edit_dead_wiring
failure_class: dataflow_unwired      # un-delegated hand-edit が束縛を orphan 化し機能が build 緑で死ぬ
trigger:
  repeated_count: 2                  # FULL incident 2026-06-19 ADR-018 event 1 (GOP-site dead-Nothing) + PARTIAL incident 2026-06-12 ORPHAN-1/2。いずれも dead-wiring を pre-merge で捕捉
  sources: ["incident", "code_review"]
  note: "2026-06-13 は misattributed (implementer の partial-record bug = haskell_werror_missing_fields の対象) のため本 class には数えない。2× = 1 full (2026-06-19) + 1 partial (2026-06-12)"
rule:
  summary: "proven-done 中に orchestrator が implementer に dispatch せず本番コードを hand-edit した場合、static-verifier は変更された本番ソース (.hs/.ts) を grep して orphan let/where 束縛 (計算したが全 construction/call site で消費されない) が無いことを確認する"
  enforcement:
    - type: rubric_item
      detail: "rubric/core/wiring.md に『orchestrator の keyboard-grab は orphan 束縛を grep で確認する』節を追加 (Step 3.5 grep = compiler-flag 検査を持たない言語向けの SECONDARY ライン)"
overlap:
  - "CAND-b2 (haskell_unused_local_binding_dead_wiring): 同一 symptom (orphan let 束縛) の static gate。Haskell では -Werror=unused-local-binds が PRIMARY ライン。本エントリは duplicate ではなく Haskell 以外の construction site 向け SECONDARY net"
  - "agent-policy §3 + memory agent-dev-follow-pipeline-faithfully: behavioral 正本/short_rule (orchestrator が implementer の代わりに配線を肩代わりしない)。2× tier で昇格済。本エントリは rubric-layer の augmentation のみで behavioral rule を再昇格しない"
eval_deferred:
  reason: "§6 eval しきい値は本 class で 3×。現在 2× (1 full 2026-06-19 + 1 partial 2026-06-12)。eval (evals/wiring/) は 3 回目の substantiated recurrence で作成、それ以前には作らない。static SYMPTOM は CAND-b2 で既にカバー済"
evidence_required:
  - changed_files
  - grep_output
rollback_condition: "n/a (doc-only rubric。exit-code firing が無いため FP exit-code も無い)"
verified_fires: false              # doc-only 昇格 (exit-code firing は無し)、他の rubric-only エントリと同様
owner: "@lihs-ie"
