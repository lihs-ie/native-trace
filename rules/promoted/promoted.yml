# FC-5: worker の外部サービス HTTP client が responseTimeout 未設定で http-client default 30s に依存し、
# 重い ML/推論サービスで ResponseTimeout を「解析失敗」に化けさせる。
# AnalyzerClient は修正済だが GoldenSpeakerClient が同型未修正 (live false-negative) だった。
id: worker_http_client_explicit_timeout
failure_class: dataflow_unwired      # 正常応答直前に worker が諦め、成功すべき経路が失敗に化ける
trigger:
  repeated_count: 2                  # AnalyzerClient (修正済) + GoldenSpeakerClient (未修正) の 2 occurrence
  sources: ["code_review", "ci"]     # incident 2026-06-14-worker-http-client-default-30s-timeout
rule:
  summary: "Worker/*Client.hs で newManager tlsManagerSettings + httpLbs を使う外部サービス呼び出しは Request に responseTimeout を明示し env (XXX_TIMEOUT_SECONDS) から読む。未設定の default 30s 依存を禁止"
  enforcement:
    - type: grep_gate
      detail: "scripts/verify-worker-http-client-timeout.sh が applications/backend/src/NativeTrace/Worker/*Client.hs を走査。newManager tlsManagerSettings を含むファイルに responseTimeout が無ければ exit 1。tree 全体を常時検査 (恒常的不変条件、BSD/GNU 両対応の find + grep -qF)"
    - type: smoke
      detail: "scripts/agent-policy-hook.sh が worker の *Client.hs 編集時に実行 + CI (.github/workflows/pr-gate.yml policy job の Worker HTTP client explicit responseTimeout step)"
    - type: rubric_item
      detail: "rubric/packs/haskell.md に『Worker HTTP client responseTimeout 明示』+『Timeout ladder 単調性 (frontend OSS_WORKER_TIMEOUT_MS ≥ worker XXX_TIMEOUT_SECONDS×1000 ≥ 下流 p95)』。rubric/core/wiring.md に『real_entrypoint を下流サービスのパスと取り違えない (worker inbound は POST /v1/pronunciation-assessments、/v1/analyze は analyzer 側)』節"
evidence_required:
  - changed_files
  - grep_output
rollback_condition: "false_positive_rate > 0.15"   # 超過時は対象を「外部 HTTP する client」に narrow (現状 newManager tlsManagerSettings の有無で gate 済。manager を立てない pure helper は対象外なので FP リスク極小)
verified_fires: true               # clean (golden 修正後): exit 0。synthetic violation (GoldenSpeakerClient の responseTimeout 行を一時削除): exit 1 + 正しいエラー。restore → exit 0 を実コマンドで確認。修正前の現状 tree でも GoldenSpeakerClient 未修正を exit 1 で検出済 (live false-negative の実証)
owner: "@lihs-ie"
