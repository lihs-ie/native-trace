services:
  worker:
    build:
      context: applications/backend
      dockerfile: Dockerfile
    container_name: native-trace-worker
    ports:
      - "8787:8787"
    environment:
      WORKER_PORT: "8787"
      ANALYZER_URL: "http://analyzer:8788"
      # シャドーイング ラグ計測のスロー再生推奨閾値（ms, M-SHL-6 / ADR-013）
      SHADOWING_LAG_THRESHOLD_MS: "500"
      # golden サービス URL（profiles: [golden] 有効時のみ golden が起動、M-GRV-4 / M-GRV-9）
      GOLDEN_SPEAKER_URL: "http://golden:8789"
    depends_on:
      analyzer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8787/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  analyzer:
    build:
      context: applications/python-analyzer
      dockerfile: Dockerfile
    container_name: native-trace-analyzer
    # v2 配線:
    #   - POST /v1/analyze は wav2vec2 GOP + NBest + parselmouth 韻律(F0/語強勢/nPVI/弱形) + 音節/epenthesis を返す
    #   - POST /v1/tts は Kokoro-82M で General American お手本音声(audio/wav)を生成 (REQ-124)
    #   - frontend (pnpm dev / 別コンテナ) は ANALYZER_URL=http://localhost:8788 で /v1/tts に到達する
    ports:
      - "8788:8788"
    environment:
      ANALYZER_PORT: "8788"
      # Kokoro-82M / wav2vec2 のモデルは HF_HOME (hf-cache volume) にキャッシュする
      HF_HOME: "/root/.cache/huggingface"
    volumes:
      - hf-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8788/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      # parselmouth + Kokoro-82M + wav2vec2 のロードで初回起動が重いため余裕をとる
      start_period: 180s

  # golden speaker サービス（ADR-012 / M-GRV-1 / M-GRV-4）
  # profiles: [golden] で有効化 → docker compose --profile golden up golden
  # 未起動でも worker / analyzer は正常動作する（M-GRV-9）
  # worker は GOLDEN_SPEAKER_URL を持つが golden 起動を depends_on しない（M-GRV-9）
  golden:
    build:
      context: applications/golden-speaker
      dockerfile: Dockerfile
    container_name: native-trace-golden
    profiles:
      - golden
    ports:
      - "8789:8789"
    environment:
      GOLDEN_PORT: "8789"
      # HF_HOME (hf-cache-golden volume) にモデルをキャッシュ（イメージ非焼込, M-GRV-10）
      HF_HOME: "/root/.cache/huggingface"
      # F0 連続性品質ゲート閾値（0.0–1.0, unvoiced 許容割合 — M-GRV-3）
      GOLDEN_QUALITY_THRESHOLD: "0.5"
      # 変換先 VCTK 話者 id（汎用ネイティブ声 — 「自分の声」でない, M-GRV-7）
      # Nekochu/RVC-VCTK_Voice-sample に実在する女性話者（F/p231/Fp231.pth）
      GOLDEN_TARGET_VOICE: "p231"
    volumes:
      # RVC/ContentVec/rmvpe モデル重みを volume で供給（Docker 非焼込 — M-GRV-10）
      - hf-cache-golden:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8789/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 60s

volumes:
  hf-cache:
  # golden サービス用 HF キャッシュ volume（RVC モデル重みの永続化 — M-GRV-10）
  hf-cache-golden:
