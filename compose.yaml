services:
  worker:
    build:
      context: applications/backend
      dockerfile: Dockerfile
    container_name: native-trace-worker
    ports:
      - "8787:8787"
    environment:
      WORKER_PORT: "8787"
      ANALYZER_URL: "http://analyzer:8788"
    depends_on:
      analyzer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8787/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  analyzer:
    build:
      context: applications/python-analyzer
      dockerfile: Dockerfile
    container_name: native-trace-analyzer
    ports:
      - "8788:8788"
    environment:
      ANALYZER_PORT: "8788"
    volumes:
      - hf-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8788/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  hf-cache:
