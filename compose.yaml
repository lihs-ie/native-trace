services:
  worker:
    build:
      context: applications/backend
      dockerfile: Dockerfile
    container_name: native-trace-worker
    ports:
      - "8787:8787"
    environment:
      WORKER_PORT: "8787"
      ANALYZER_URL: "http://analyzer:8788"
      # シャドーイング ラグ計測のスロー再生推奨閾値（ms, M-SHL-6 / ADR-013）
      SHADOWING_LAG_THRESHOLD_MS: "500"
    depends_on:
      analyzer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8787/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  analyzer:
    build:
      context: applications/python-analyzer
      dockerfile: Dockerfile
    container_name: native-trace-analyzer
    # v2 配線:
    #   - POST /v1/analyze は wav2vec2 GOP + NBest + parselmouth 韻律(F0/語強勢/nPVI/弱形) + 音節/epenthesis を返す
    #   - POST /v1/tts は Kokoro-82M で General American お手本音声(audio/wav)を生成 (REQ-124)
    #   - frontend (pnpm dev / 別コンテナ) は ANALYZER_URL=http://localhost:8788 で /v1/tts に到達する
    ports:
      - "8788:8788"
    environment:
      ANALYZER_PORT: "8788"
      # Kokoro-82M / wav2vec2 のモデルは HF_HOME (hf-cache volume) にキャッシュする
      HF_HOME: "/root/.cache/huggingface"
    volumes:
      - hf-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8788/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      # parselmouth + Kokoro-82M + wav2vec2 のロードで初回起動が重いため余裕をとる
      start_period: 180s

volumes:
  hf-cache:
