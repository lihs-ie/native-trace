version: 2
updates:
  # pnpm workspace (root lockfile covers applications/frontend)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Tokyo"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "deps"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 10

  # NOTE: applications/backend (cabal) is not supported by Dependabot — update manually.

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Tokyo"
    commit-message:
      prefix: "ci"
    labels:
      - "deps"
    groups:
      actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5
