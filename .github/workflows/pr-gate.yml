name: pr-gate

# agent-policy merge gate: 文書ではなくハードゲート。
# policy (no-prod-doubles / test-bypass / wiring / no-stub-placeholder / allowlist-expiry) を required check にする。
# build/test は既存の backend-ci.yml / frontend-ci.yml / python-analyzer-ci.yml が担うためここでは再実行しない。
# AI review (codex / claude) は repo variable ENABLE_CODEX_REVIEW / ENABLE_CLAUDE_REVIEW + secret で
# 有効化する opt-in job (未設定なら skip・merge gate は決定論ゲートのみで判定)。
on:
  pull_request:

permissions:
  contents: read

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: No production test doubles
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: bash scripts/verify-no-prod-doubles.sh
      - name: No test-only bypass
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: bash scripts/verify-test-bypass.sh
      - name: Wiring follows implementation
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: bash scripts/verify-wiring.sh
      - name: No unwired placeholder stub
        run: bash scripts/verify-no-stub-placeholder.sh
      - name: Haskell cabal warnings hardened (-Werror=missing-fields)
        run: bash scripts/verify-haskell-warnings.sh
      - name: Servant route/handler parity (Api.hs <-> Application.hs)
        run: bash scripts/verify-servant-route-handler-parity.sh
      - name: Worker HTTP client explicit responseTimeout (*Client.hs)
        run: bash scripts/verify-worker-http-client-timeout.sh
      - name: Analyzer/golden-speaker src imports present in Dockerfile pip list
        run: bash scripts/verify-analyzer-deps.sh
      - name: Allowlist not expired
        run: bash scripts/verify-allowlist-expiry.sh
      - name: No harness import in production src (ADR-031 D7)
        run: bash scripts/verify-no-harness-import-in-prod.sh
      - name: Upload policy evidence
        if: ${{ success() || failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: policy-evidence
          path: |
            .agent-evidence/**
          if-no-files-found: ignore

  integration_smoke:
    # GATE BEHAVIOR CHANGE (ADR-031 D5/M-FCH-8):
    # v1 declare-only echo → actual pnpm test:fullcycle gop-delta invocation.
    # Cold-stack cost: docker compose up --build + cold analyzer (start_period:180s) +
    # pnpm build + next start. Total: ~5–10 min on GHA (warm: ~2–3 min).
    # Mitigation: GHA layer cache for docker + HF model cache volume (follow-up).
    # For now this job runs unconditionally. label-gated nightly CI is a future slice.
    needs: [policy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - name: Install pnpm
        run: corepack enable && corepack prepare --activate
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: applications/frontend
      - name: Run full-cycle smoke (gop-delta)
        # canonical invocation: root pnpm delegates to @native-trace/frontend via --filter
        run: pnpm test:fullcycle gop-delta
      - name: Upload smoke evidence
        if: ${{ success() || failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: smoke-evidence
          path: |
            .agent-evidence/**
          if-no-files-found: ignore

  # --- opt-in AI review (merge gate の required には含めない / 助言的) ---
  codex_review:
    if: ${{ vars.ENABLE_CODEX_REVIEW == 'true' }}
    needs: [policy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Codex review (AGENTS.md の review guideline に従う)
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/review.md
          output-file: codex-output.md
      - name: Upload codex review
        if: ${{ success() || failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: codex-review
          path: codex-output.md
          if-no-files-found: ignore

  claude_review:
    if: ${{ vars.ENABLE_CLAUDE_REVIEW == 'true' }}
    needs: [policy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Claude review (CLAUDE.md / AGENTS.md の review guideline に従う)
        uses: anthropics/claude-code-action@v1
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: "Review this PR against AGENTS.md review guidelines: 配線漏れ・偽成功・本番 test double を最優先で検査。"

  summary:
    if: ${{ success() || failure() }}
    needs: [policy, integration_smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Write job summary
        run: |
          {
            echo "## PR Gate Summary"
            echo "- policy (決定論ゲート, required): ${{ needs.policy.result }}"
            echo "- integration_smoke: ${{ needs.integration_smoke.result }} (pnpm test:fullcycle gop-delta — active invoke)"
            echo "- AI review は opt-in (ENABLE_CODEX_REVIEW / ENABLE_CLAUDE_REVIEW)。merge gate の required ではない。"
            echo "- evidence artifacts uploaded"
          } >> "$GITHUB_STEP_SUMMARY"
