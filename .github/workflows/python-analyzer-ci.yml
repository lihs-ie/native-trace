name: python-analyzer-ci

on:
  push:
    paths:
      - "applications/python-analyzer/**"
  pull_request:
    paths:
      - "applications/python-analyzer/**"

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: ruff check
        working-directory: applications/python-analyzer
        run: ruff check src/ test/
      - name: ruff format check
        working-directory: applications/python-analyzer
        run: ruff format --check src/ test/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build python-analyzer Docker image
        run: docker compose build analyzer
      - name: Run tests in Docker container
        run: |
          docker compose run --rm --no-deps analyzer \
            bash -c "cd /app && PYTHONPATH=/app/src pytest test/ -v"
      - name: Run ruff in Docker container
        run: |
          docker compose run --rm --no-deps analyzer \
            bash -c "cd /app && ruff check src/ test/ && ruff format --check src/ test/"
      # pyright must run in the container: the runtime image has the project
      # deps (fastapi/numpy/scipy/torch/soundfile/...) baked in, so imports
      # resolve. Running it on the bare host (pip install pyright only) yields
      # spurious reportMissingImports for every third-party package.
      - name: Run pyright in Docker container
        run: |
          docker compose run --rm --no-deps analyzer \
            bash -c "cd /app && pyright src/"
